<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starlink Constellation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #02040a;
      font-family: "SF Pro Display", "Segoe UI", system-ui, -apple-system, sans-serif;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      display: none;
      min-width: 240px;
      max-width: 320px;
      padding: 14px 16px;
      border-radius: 12px;
      background: linear-gradient(160deg, rgba(8, 16, 32, 0.94), rgba(4, 10, 22, 0.96));
      border: 1px solid rgba(120, 200, 255, 0.28);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.4),
        0 12px 40px rgba(0, 20, 60, 0.55),
        0 0 28px rgba(80, 180, 255, 0.12);
      color: #e8f4ff;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transform: translate(14px, 14px);
    }
    #tooltip .name {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0.03em;
      color: #f0f8ff;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(120, 200, 255, 0.18);
    }
    #tooltip .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 12px;
      line-height: 1.65;
    }
    #tooltip .label {
      color: rgba(160, 200, 230, 0.65);
      font-weight: 500;
      white-space: nowrap;
    }
    #tooltip .value {
      color: #c8e8ff;
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-weight: 500;
    }
    #tooltip .value.accent { color: #7ee0ff; }
    #hud {
      position: fixed;
      top: 18px;
      left: 22px;
      z-index: 5;
      pointer-events: none;
      color: rgba(180, 220, 255, 0.55);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }
    #hud strong {
      color: rgba(200, 235, 255, 0.85);
      font-weight: 600;
    }
    #hud .sub {
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: none;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">
    <div>Starlink · <strong id="count">—</strong> satellites</div>
    <div class="sub" id="status">propagating orbits…</div>
  </div>
  <div id="tooltip"></div>

  <script src="satellite.min.js"></script>
  <script src="starlink-data.js"></script>
  <script>
(function () {
  'use strict';

  const EARTH_R = 6371; // km
  const MU = 398600.4418; // km^3/s^2 (for fallback speed)
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });
  const tooltip = document.getElementById('tooltip');
  const countEl = document.getElementById('count');
  const statusEl = document.getElementById('status');

  let W = 0, H = 0, dpr = 1;
  let stars = [];

  // View state
  let rotY = 0.35;       // yaw around polar axis
  let rotX = 0.38;       // tilt
  let autoRot = 0.00022; // rad per ms of wall time when animating
  let timeScale = 480;   // sim seconds per wall second (time-lapse)
  let simTime = Date.now();
  let lastWall = performance.now();
  let frozen = false;
  let mouseX = -9999, mouseY = -9999;
  let hoverIdx = -1;

  // Satellite records
  /** @type {{satrec:any, name:string, launch:string, status:string, site:string, x:number,y:number,z:number,vx:number,vy:number,vz:number, valid:boolean, sx:number,sy:number,depth:number,visible:boolean}[]} */
  let sats = [];

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildStars();
  }

  function buildStars() {
    const n = Math.floor((W * H) / 2800);
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.15 + 0.2,
        a: Math.random() * 0.45 + 0.12,
        tw: Math.random() * Math.PI * 2,
      });
    }
  }

  function initSats() {
    const raw = window.SAT || [];
    sats = [];
    for (let i = 0; i < raw.length; i++) {
      const row = raw[i];
      if (!row || row.length < 3) continue;
      try {
        const satrec = satellite.twoline2satrec(row[1], row[2]);
        if (satrec.error) continue;
        sats.push({
          satrec,
          name: row[0] || 'UNKNOWN',
          launch: row[3] || '—',
          status: row[4] || '—',
          site: row[5] || '—',
          x: 0, y: 0, z: 0,
          vx: 0, vy: 0, vz: 0,
          valid: false,
          sx: 0, sy: 0, depth: 0, visible: false,
        });
      } catch (_) { /* skip bad TLE */ }
    }
    countEl.textContent = sats.length.toLocaleString();
  }

  // Rotate ECI-ish frame for display: apply view rotation (rotX tilt, rotY spin)
  function project(x, y, z, scale, cx, cy) {
    // rotY around Y (polar)
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    let x1 = x * cosY + z * sinY;
    let y1 = y;
    let z1 = -x * sinY + z * cosY;
    // rotX around X (tilt)
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    let x2 = x1;
    let y2 = y1 * cosX - z1 * sinX;
    let z2 = y1 * sinX + z1 * cosX;
    // perspective-ish orthographic blend
    const persp = 1 / (1 + z2 * 0.18);
    const sx = cx + x2 * scale * persp;
    const sy = cy - y2 * scale * persp;
    return { sx, sy, depth: z2, x2, y2, z2 };
  }

  function propagateAll(date) {
    for (let i = 0; i < sats.length; i++) {
      const s = sats[i];
      try {
        const pv = satellite.propagate(s.satrec, date);
        if (!pv || !pv.position || pv.position.x == null) {
          s.valid = false;
          continue;
        }
        // ECI km → unit Earth radii
        s.x = pv.position.x / EARTH_R;
        s.y = pv.position.z / EARTH_R; // map ECI Z (north) → display Y
        s.z = pv.position.y / EARTH_R;
        if (pv.velocity) {
          s.vx = pv.velocity.x;
          s.vy = pv.velocity.y;
          s.vz = pv.velocity.z;
        }
        s.valid = true;
      } catch (_) {
        s.valid = false;
      }
    }
  }

  function drawStarfield(t) {
    ctx.fillStyle = '#02040a';
    ctx.fillRect(0, 0, W, H);

    // subtle radial vignette of deep blue
    const g = ctx.createRadialGradient(W * 0.5, H * 0.48, 0, W * 0.5, H * 0.48, Math.max(W, H) * 0.72);
    g.addColorStop(0, 'rgba(10, 22, 48, 0.55)');
    g.addColorStop(0.55, 'rgba(4, 10, 24, 0.25)');
    g.addColorStop(1, 'rgba(1, 2, 6, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      const tw = 0.55 + 0.45 * Math.sin(t * 0.0011 + s.tw);
      ctx.beginPath();
      ctx.fillStyle = `rgba(210, 225, 255, ${s.a * tw})`;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawEarth(cx, cy, R) {
    // Soft atmospheric glow (outer rim)
    const glow = ctx.createRadialGradient(cx, cy, R * 0.82, cx, cy, R * 1.22);
    glow.addColorStop(0, 'rgba(60, 140, 255, 0)');
    glow.addColorStop(0.55, 'rgba(40, 130, 255, 0.08)');
    glow.addColorStop(0.78, 'rgba(80, 170, 255, 0.22)');
    glow.addColorStop(0.92, 'rgba(140, 210, 255, 0.38)');
    glow.addColorStop(1, 'rgba(180, 230, 255, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, R * 1.22, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Globe body
    const body = ctx.createRadialGradient(
      cx - R * 0.35, cy - R * 0.4, R * 0.05,
      cx, cy, R
    );
    body.addColorStop(0, '#1a3a68');
    body.addColorStop(0.35, '#0c2248');
    body.addColorStop(0.7, '#061428');
    body.addColorStop(1, '#020810');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = body;
    ctx.fill();

    // Subtle lat/lon grid (rotated with globe)
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.clip();

    ctx.strokeStyle = 'rgba(90, 160, 220, 0.085)';
    ctx.lineWidth = 1;

    // Parallels
    for (let lat = -60; lat <= 60; lat += 30) {
      ctx.beginPath();
      let first = true;
      for (let lon = 0; lon <= 360; lon += 6) {
        const la = (lat * Math.PI) / 180;
        const lo = (lon * Math.PI) / 180;
        const ex = Math.cos(la) * Math.sin(lo);
        const ey = Math.sin(la);
        const ez = Math.cos(la) * Math.cos(lo);
        const p = project(ex, ey, ez, R, cx, cy);
        if (p.depth < -0.02) { first = true; continue; }
        if (first) { ctx.moveTo(p.sx, p.sy); first = false; }
        else ctx.lineTo(p.sx, p.sy);
      }
      ctx.stroke();
    }

    // Meridians
    for (let lon = 0; lon < 360; lon += 30) {
      ctx.beginPath();
      let first = true;
      for (let lat = -90; lat <= 90; lat += 4) {
        const la = (lat * Math.PI) / 180;
        const lo = (lon * Math.PI) / 180;
        const ex = Math.cos(la) * Math.sin(lo);
        const ey = Math.sin(la);
        const ez = Math.cos(la) * Math.cos(lo);
        const p = project(ex, ey, ez, R, cx, cy);
        if (p.depth < -0.02) { first = true; continue; }
        if (first) { ctx.moveTo(p.sx, p.sy); first = false; }
        else ctx.lineTo(p.sx, p.sy);
      }
      ctx.stroke();
    }

    // Soft terminator / limb shading
    const shade = ctx.createRadialGradient(
      cx + R * 0.25, cy - R * 0.1, R * 0.2,
      cx, cy, R
    );
    shade.addColorStop(0, 'rgba(0,0,0,0)');
    shade.addColorStop(0.65, 'rgba(0,0,0,0.08)');
    shade.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = shade;
    ctx.fill();

    ctx.restore();

    // Crisp atmospheric rim stroke
    const rim = ctx.createRadialGradient(cx, cy, R * 0.94, cx, cy, R * 1.02);
    // Draw ring as stroke with glow
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(120, 200, 255, 0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, R + 1.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(160, 220, 255, 0.18)';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  function drawSats(cx, cy, R) {
    // Sort by depth back→front for correct additive look
    const order = [];
    for (let i = 0; i < sats.length; i++) {
      const s = sats[i];
      if (!s.valid) {
        s.visible = false;
        continue;
      }
      const p = project(s.x, s.y, s.z, R, cx, cy);
      s.sx = p.sx;
      s.sy = p.sy;
      s.depth = p.depth;
      // Occlusion: hide if behind the globe (ray from camera hits sphere first)
      // Globe is unit sphere in same coords; sat at radius r, depth z2
      const r = Math.sqrt(s.x * s.x + s.y * s.y + s.z * s.z);
      // Visible if in front of the sphere limb: if z2 is negative (behind), check if
      // projected radius is outside the Earth disk, or simply z2 > 0 after rotation
      // Better: hide when behind Earth surface along view axis
      // View looks toward -Z after rotation... our depth is z2 (positive = toward camera-ish)
      // After project, larger depth = closer to viewer (front)
      // Occluded if behind globe: depth < 0 and inside the silhouette of the unit sphere
      const radial2d = Math.hypot(p.x2, p.y2);
      const behind = p.depth < 0;
      const insideDisk = radial2d < 1.0 * Math.sqrt(Math.max(0, 1 - 0.0001));
      // More accurate: if sat is behind the front hemisphere of the unit sphere
      // hide when the line of sight intersects unit sphere before the sat.
      // Orthographic-ish: if depth < 0 and hypot(x2,y2) < sqrt(1 - depth^2) for depth on sphere...
      // Simple reliable: hide when behind and projected inside earth radius (in screen units relative)
      const earthScreenR = R; // scale already applied via project
      const distFromCenter = Math.hypot(p.sx - cx, p.sy - cy);
      // For points with depth < 0 (back half of view), occlude if inside Earth disk
      // Also occlude if sat is below Earth surface and on far side
      const underHorizon = behind && distFromCenter < R * 0.995;
      s.visible = !underHorizon && r > 0.95;
      if (s.visible) order.push(i);
    }

    order.sort((a, b) => sats[a].depth - sats[b].depth);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    for (let k = 0; k < order.length; k++) {
      const s = sats[order[k]];
      // Depth shade: front brighter
      const dNorm = (s.depth + 1.4) / 2.8; // ~0..1
      const bright = 0.28 + 0.72 * Math.max(0, Math.min(1, dNorm));
      const size = 0.7 + 1.1 * bright;

      // soft glow
      const gr = ctx.createRadialGradient(s.sx, s.sy, 0, s.sx, s.sy, size * 3.2);
      gr.addColorStop(0, `rgba(200, 245, 255, ${0.55 * bright})`);
      gr.addColorStop(0.35, `rgba(100, 210, 255, ${0.28 * bright})`);
      gr.addColorStop(1, 'rgba(40, 140, 255, 0)');
      ctx.beginPath();
      ctx.fillStyle = gr;
      ctx.arc(s.sx, s.sy, size * 3.2, 0, Math.PI * 2);
      ctx.fill();

      // core
      ctx.beginPath();
      ctx.fillStyle = `rgba(235, 250, 255, ${0.75 * bright + 0.15})`;
      ctx.arc(s.sx, s.sy, size * 0.55, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Highlight ring for hover (while frozen)
    if (frozen && hoverIdx >= 0) {
      const s = sats[hoverIdx];
      if (s && s.visible) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        ctx.arc(s.sx, s.sy, 9, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(160, 230, 255, 0.9)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(s.sx, s.sy, 14, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(100, 200, 255, 0.35)';
        ctx.lineWidth = 2;
        ctx.stroke();
        // bright core pulse
        ctx.beginPath();
        ctx.fillStyle = 'rgba(220, 250, 255, 0.95)';
        ctx.arc(s.sx, s.sy, 2.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  function findHover() {
    if (!frozen) return -1;
    let best = -1;
    let bestD = 14; // px hit radius
    for (let i = 0; i < sats.length; i++) {
      const s = sats[i];
      if (!s.visible || !s.valid) continue;
      const dx = s.sx - mouseX;
      const dy = s.sy - mouseY;
      const d = Math.hypot(dx, dy);
      if (d < bestD) {
        bestD = d;
        best = i;
      }
    }
    return best;
  }

  function fmt(n, d) {
    if (!isFinite(n)) return '—';
    return n.toFixed(d);
  }

  function updateTooltip() {
    if (!frozen || hoverIdx < 0) {
      tooltip.style.display = 'none';
      return;
    }
    const s = sats[hoverIdx];
    if (!s || !s.valid) {
      tooltip.style.display = 'none';
      return;
    }

    const date = new Date(simTime);
    let lat = '—', lon = '—', alt = '—', speed = '—';
    try {
      // Rebuild ECI position in original axes for geodetic
      const pv = satellite.propagate(s.satrec, date);
      if (pv && pv.position) {
        const gmst = satellite.gstime(date);
        const geo = satellite.eciToGeodetic(pv.position, gmst);
        lat = satellite.degreesLat(geo.latitude);
        lon = satellite.degreesLong(geo.longitude);
        alt = geo.height;
        if (pv.velocity) {
          const v = pv.velocity;
          speed = Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
        } else {
          const r = Math.sqrt(
            pv.position.x ** 2 + pv.position.y ** 2 + pv.position.z ** 2
          );
          speed = Math.sqrt(MU / r);
        }
      }
    } catch (_) { /* keep dashes */ }

    const norad = (s.satrec.satnum != null ? String(s.satrec.satnum) : '—').trim();

    tooltip.innerHTML =
      `<div class="name">${escapeHtml(s.name)}</div>` +
      row('NORAD', norad) +
      row('Launch', s.launch) +
      row('Status', s.status) +
      row('Launch site', s.site) +
      row('Altitude', typeof alt === 'number' ? fmt(alt, 1) + ' km' : alt, true) +
      row('Speed', typeof speed === 'number' ? fmt(speed, 3) + ' km/s' : speed, true) +
      row('Latitude', typeof lat === 'number' ? fmt(lat, 3) + '°' : lat) +
      row('Longitude', typeof lon === 'number' ? fmt(lon, 3) + '°' : lon);

    // Position near cursor, keep on screen
    let tx = mouseX + 14;
    let ty = mouseY + 14;
    tooltip.style.display = 'block';
    // measure after display
    const tw = tooltip.offsetWidth || 260;
    const th = tooltip.offsetHeight || 200;
    if (tx + tw > W - 10) tx = mouseX - tw - 14;
    if (ty + th > H - 10) ty = mouseY - th - 10;
    if (tx < 8) tx = 8;
    if (ty < 8) ty = 8;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
    tooltip.style.transform = 'none';
  }

  function row(label, value, accent) {
    return `<div class="row"><span class="label">${label}</span><span class="value${accent ? ' accent' : ''}">${escapeHtml(String(value))}</span></div>`;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  let lastProp = 0;
  const PROP_INTERVAL = 50; // ms between SGP4 updates when animating

  function frame(now) {
    const dt = Math.min(64, now - lastWall);
    lastWall = now;

    if (!frozen) {
      rotY += autoRot * dt;
      simTime += dt * timeScale;
      if (now - lastProp > PROP_INTERVAL) {
        propagateAll(new Date(simTime));
        lastProp = now;
      }
      statusEl.textContent = 'live · move mouse to freeze';
    } else {
      statusEl.textContent = 'frozen · hover a satellite';
      hoverIdx = findHover();
      updateTooltip();
    }

    if (!frozen) {
      hoverIdx = -1;
      tooltip.style.display = 'none';
    }

    const cx = W * 0.5;
    const cy = H * 0.5;
    const R = Math.min(W, H) * 0.32;

    drawStarfield(now);
    drawEarth(cx, cy, R);
    drawSats(cx, cy, R);

    requestAnimationFrame(frame);
  }

  // Interaction: freeze while pointer is over the visualization
  function onMove(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!frozen) {
      frozen = true;
      // ensure positions are current at freeze moment
      propagateAll(new Date(simTime));
    }
    if (frozen) {
      hoverIdx = findHover();
      updateTooltip();
    }
  }

  function onLeave() {
    frozen = false;
    hoverIdx = -1;
    mouseX = -9999;
    mouseY = -9999;
    tooltip.style.display = 'none';
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', onMove);
  document.addEventListener('mouseleave', onLeave);
  canvas.addEventListener('mouseleave', onLeave);
  // Also treat leaving the window
  window.addEventListener('blur', onLeave);

  resize();
  initSats();
  propagateAll(new Date(simTime));
  lastWall = performance.now();
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
