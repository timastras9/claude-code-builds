<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Northwind Supply — Store Analytics</title>
<style>
  :root{
    --bg:#0a0d12;
    --panel:#111721;
    --panel-2:#161d29;
    --line:#212a38;
    --text:#e8edf5;
    --muted:#8a97ab;
    --accent:#5b9dff;
    --accent-2:#37e0b0;
    --warn:#ffb45b;
    --pink:#f2749b;
    --violet:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(900px 500px at 12% -8%, rgba(91,157,255,.14), transparent 62%),
      radial-gradient(760px 460px at 92% 0%, rgba(55,224,176,.10), transparent 60%),
      var(--bg);
    color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:22px clamp(14px,2.4vw,34px) 30px;
    min-height:100%;
  }
  .wrap{max-width:1500px;margin:0 auto;display:flex;flex-direction:column;gap:18px}

  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .mark{
    width:38px;height:38px;border-radius:11px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;color:#06121f;font-weight:800;font-size:17px;
    box-shadow:0 6px 20px rgba(91,157,255,.35);
  }
  h1{font-size:19px;font-weight:650;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .live{
    display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;
    background:var(--panel);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 0 0 rgba(55,224,176,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{70%{box-shadow:0 0 0 8px rgba(55,224,176,0)}100%{box-shadow:0 0 0 0 rgba(55,224,176,0)}}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:16px;padding:16px 18px 38px;
    position:relative;overflow:hidden;
  }
  .card::after{content:"";position:absolute;inset:0 0 auto 0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent)}
  .k-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
  .k-val{font-size:clamp(24px,2.4vw,32px);font-weight:700;letter-spacing:-1px;margin:8px 0 6px;font-variant-numeric:tabular-nums}
  .k-foot{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .chip{font-weight:650;padding:2px 7px;border-radius:6px;font-size:12px}
  .up{color:#4ee6b8;background:rgba(55,224,176,.12)}
  .down{color:#ff8fa8;background:rgba(242,116,155,.12)}
  .spark{position:absolute;right:0;bottom:0;width:100%;height:34px;opacity:.45}

  .grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
  .panel{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:16px 18px 12px;display:flex;flex-direction:column;min-width:0}
  .p-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px}
  h2{font-size:14.5px;font-weight:650;letter-spacing:-.1px}
  .p-note{color:var(--muted);font-size:12px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:2px}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:6px}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .g-line{stroke:var(--line);stroke-width:1}
  .ax{fill:var(--muted);font-size:11px}
  .val{fill:var(--text);font-size:11.5px;font-weight:650;font-variant-numeric:tabular-nums}

  .src{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .src-list{flex:1 1 190px;display:flex;flex-direction:column;gap:11px;min-width:0}
  .src-row{display:grid;grid-template-columns:1fr auto;gap:4px 10px;font-size:13px}
  .src-name{display:flex;align-items:center;gap:8px;min-width:0}
  .src-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .src-pct{color:var(--muted);font-variant-numeric:tabular-nums}
  .bar{grid-column:1/-1;height:5px;border-radius:4px;background:#1c2431;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:4px;width:0;transition:width 1.1s cubic-bezier(.22,.9,.3,1)}

  .draw{stroke-dasharray:var(--len);stroke-dashoffset:var(--len);animation:draw 1.6s cubic-bezier(.3,.8,.3,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .fade{opacity:0;animation:fade .9s ease forwards}
  @keyframes fade{to{opacity:1}}
  .grow{transform:scaleX(0);transform-origin:left;animation:grow 1.1s cubic-bezier(.22,.9,.3,1) forwards}
  @keyframes grow{to{transform:scaleX(1)}}

  @media (max-width:1080px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .grid{grid-template-columns:1fr}
  }
  @media (max-width:560px){
    body{padding:16px 12px 24px}
    .kpis{grid-template-columns:repeat(2,1fr);gap:10px}
    .card{padding:13px 14px 34px}
    .src{flex-direction:column;align-items:stretch}
    .src-list{width:100%}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark">N</div>
      <div>
        <h1>Northwind Supply — Store Analytics</h1>
        <div class="sub" id="range">Last 12 months</div>
      </div>
    </div>
    <div class="live"><span class="dot"></span> Live · synced just now</div>
  </header>

  <section class="kpis" id="kpis"></section>

  <section class="grid">
    <div class="panel">
      <div class="p-head">
        <h2>Revenue over time</h2>
        <span class="p-note" id="revNote"></span>
      </div>
      <div class="legend">
        <span><i style="background:var(--accent)"></i>Revenue</span>
        <span><i style="background:var(--violet)"></i>Orders (scaled)</span>
      </div>
      <div id="revChart"></div>
    </div>

    <div class="panel">
      <div class="p-head">
        <h2>Traffic sources</h2>
        <span class="p-note">by sessions</span>
      </div>
      <div class="src">
        <div id="donut"></div>
        <div class="src-list" id="srcList"></div>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="p-head">
      <h2>Top products</h2>
      <span class="p-note" id="prodNote"></span>
    </div>
    <div id="prodChart"></div>
  </section>
</div>

<script>
(() => {
  /* ---------- deterministic sample data (last 12 months) ---------- */
  let seed = 20260723;
  const rnd = () => (seed = (seed * 1664525 + 1013904223) % 4294967296) / 4294967296;
  const jitter = (a) => 1 + (rnd() - 0.5) * a;

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const now = new Date(2026, 6, 1); // Jul 2026
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ label: MONTHS[d.getMonth()], year: d.getFullYear(), idx: 11 - i });
  }
  // growth trend + seasonality (Nov/Dec spike) + noise
  const series = months.map((m, i) => {
    const trend = 41000 * Math.pow(1.052, i);
    const mo = new Date(now.getFullYear(), now.getMonth() - (11 - i), 1).getMonth();
    const season = mo === 10 ? 1.34 : mo === 11 ? 1.52 : mo === 0 ? 0.82 : mo === 6 ? 0.93 : 1;
    const revenue = Math.round(trend * season * jitter(0.14));
    const aov = 86 + rnd() * 26 + i * 0.9;
    const orders = Math.max(120, Math.round(revenue / aov));
    const sessions = Math.round(orders / (0.021 + rnd() * 0.011));
    return { ...m, revenue, orders, sessions };
  });

  const sum = (k) => series.reduce((a, r) => a + r[k], 0);
  const totalRev = sum("revenue"), totalOrd = sum("orders"), totalSess = sum("sessions");
  const aov = totalRev / totalOrd, cvr = (totalOrd / totalSess) * 100;

  const h2 = series.slice(6), h1 = series.slice(0, 6);
  const half = (k) => {
    const a = h1.reduce((s, r) => s + r[k], 0), b = h2.reduce((s, r) => s + r[k], 0);
    return ((b - a) / a) * 100;
  };
  const aovH1 = h1.reduce((s,r)=>s+r.revenue,0) / h1.reduce((s,r)=>s+r.orders,0);
  const aovH2 = h2.reduce((s,r)=>s+r.revenue,0) / h2.reduce((s,r)=>s+r.orders,0);
  const cvrH1 = h1.reduce((s,r)=>s+r.orders,0) / h1.reduce((s,r)=>s+r.sessions,0);
  const cvrH2 = h2.reduce((s,r)=>s+r.orders,0) / h2.reduce((s,r)=>s+r.sessions,0);

  const products = [
    { name: "Aurora Desk Lamp",        units: 3184, color: "var(--accent)" },
    { name: "Nimbus Wireless Charger", units: 2761, color: "var(--accent)" },
    { name: "Verge Leather Sleeve",    units: 2140, color: "var(--accent)" },
    { name: "Terra Ceramic Mug Set",   units: 1893, color: "var(--accent)" },
    { name: "Halo Desk Mat",           units: 1622, color: "var(--accent)" },
    { name: "Pulse USB-C Hub",         units: 1408, color: "var(--accent)" },
    { name: "Drift Linen Throw",       units: 1145, color: "var(--accent)" }
  ].map(p => ({ ...p, revenue: Math.round(p.units * (48 + rnd() * 62)) }))
   .sort((a, b) => b.revenue - a.revenue)
   .slice(0, 6);

  const sources = [
    { name: "Organic search", pct: 34.2, color: "#5b9dff" },
    { name: "Paid social",    pct: 24.6, color: "#37e0b0" },
    { name: "Direct",         pct: 16.9, color: "#a78bfa" },
    { name: "Email",          pct: 12.4, color: "#ffb45b" },
    { name: "Referral",       pct:  7.3, color: "#f2749b" },
    { name: "Affiliates",     pct:  4.6, color: "#5f7089" }
  ];

  /* ---------- formatting ---------- */
  const money = (n) => "$" + Math.round(n).toLocaleString("en-US");
  const kmoney = (n) => n >= 1e6 ? "$" + (n / 1e6).toFixed(2) + "M" : n >= 1e3 ? "$" + Math.round(n / 1e3) + "k" : "$" + Math.round(n);
  const num = (n) => Math.round(n).toLocaleString("en-US");
  const pct = (n) => (n >= 0 ? "+" : "") + n.toFixed(1) + "%";
  const el = (s) => document.querySelector(s);

  document.getElementById("range").textContent =
    `${series[0].label} ${series[0].year} – ${series[11].label} ${series[11].year} · all channels`;

  /* ---------- KPI cards + sparklines ---------- */
  const sparkline = (vals, color) => {
    const w = 300, h = 42, mn = Math.min(...vals), mx = Math.max(...vals), pad = 4;
    const x = (i) => (i / (vals.length - 1)) * w;
    const y = (v) => h - pad - ((v - mn) / (mx - mn || 1)) * (h - pad * 2);
    const line = vals.map((v, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <path d="${line} L${w},${h} L0,${h} Z" fill="${color}" opacity=".13"/>
      <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  };

  const kpis = [
    { label: "Total revenue",   val: kmoney(totalRev), delta: half("revenue"), foot: "vs. prior 6 months", vals: series.map(r => r.revenue), color: "#5b9dff" },
    { label: "Orders",          val: num(totalOrd),    delta: half("orders"),  foot: "vs. prior 6 months", vals: series.map(r => r.orders),  color: "#a78bfa" },
    { label: "Avg. order value",val: money(aov),       delta: ((aovH2 - aovH1) / aovH1) * 100, foot: "vs. prior 6 months", vals: series.map(r => r.revenue / r.orders), color: "#37e0b0" },
    { label: "Conversion rate", val: cvr.toFixed(2) + "%", delta: ((cvrH2 - cvrH1) / cvrH1) * 100, foot: "vs. prior 6 months", vals: series.map(r => (r.orders / r.sessions) * 100), color: "#ffb45b" }
  ];

  el("#kpis").innerHTML = kpis.map((k, i) => `
    <div class="card fade" style="animation-delay:${i * 90}ms">
      ${sparkline(k.vals, k.color)}
      <div style="position:relative">
        <div class="k-label">${k.label}</div>
        <div class="k-val">${k.val}</div>
        <div class="k-foot"><span class="chip ${k.delta >= 0 ? "up" : "down"}">${k.delta >= 0 ? "▲" : "▼"} ${pct(k.delta)}</span> ${k.foot}</div>
      </div>
    </div>`).join("");

  /* ---------- revenue over time: line + area + secondary orders line ---------- */
  const drawRevenue = (W) => {
    const H = Math.max(210, Math.min(300, W * 0.36)), L = 52, R = 14, T = 18, B = 30;
    const iw = W - L - R, ih = H - T - B;
    const every = W < 430 ? 2 : 1;
    const maxRev = Math.max(...series.map(r => r.revenue));
    const ticks = H < 240 ? 4 : 5;
    const step = 5000 * ticks;                       // keeps every axis label a round number
    const top = Math.ceil((maxRev * 1.08) / step) * step;
    const maxOrd = Math.max(...series.map(r => r.orders));

    const x = (i) => L + (i / (series.length - 1)) * iw;
    const yR = (v) => T + ih - (v / top) * ih;
    const yO = (v) => T + ih - (v / (maxOrd * 1.25)) * ih;

    let grid = "", i;
    for (i = 0; i <= ticks; i++) {
      const v = (top / ticks) * i, y = yR(v);
      grid += `<line class="g-line" x1="${L}" y1="${y.toFixed(1)}" x2="${W - R}" y2="${y.toFixed(1)}"/>
               <text class="ax" x="${L - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end">${kmoney(v)}</text>`;
    }

    const path = (acc, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${acc.toFixed(1)}`;
    const revLine = series.map((r, i) => path(yR(r.revenue), i)).join(" ");
    const ordLine = series.map((r, i) => path(yO(r.orders), i)).join(" ");
    const area = `${revLine} L${x(11).toFixed(1)},${T + ih} L${L},${T + ih} Z`;

    const dots = series.map((r, i) => `
      <circle cx="${x(i).toFixed(1)}" cy="${yR(r.revenue).toFixed(1)}" r="3.6" fill="#0a0d12" stroke="var(--accent)" stroke-width="2.2"/>
      <title>${r.label} ${r.year} — ${money(r.revenue)} · ${num(r.orders)} orders</title>`).join("");

    const labels = series.map((r, i) => i % every ? "" :
      `<text class="ax" x="${x(i).toFixed(1)}" y="${H - 8}" text-anchor="middle">${r.label}</text>`).join("");

    const best = series.reduce((a, b) => (b.revenue > a.revenue ? b : a));
    const bi = series.indexOf(best);
    const peak = `<text class="val" x="${x(bi).toFixed(1)}" y="${(yR(best.revenue) - 14).toFixed(1)}" text-anchor="${bi > 9 ? "end" : "middle"}">${kmoney(best.revenue)}</text>`;

    el("#revChart").innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" role="img" aria-label="Revenue over the last 12 months">
        <defs>
          <linearGradient id="revFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5b9dff" stop-opacity=".38"/>
            <stop offset="100%" stop-color="#5b9dff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${grid}
        <path d="${area}" fill="url(#revFill)" class="fade" style="animation-delay:.55s"/>
        <path d="${ordLine}" fill="none" stroke="var(--violet)" stroke-width="2" stroke-dasharray="5 5" opacity=".75" class="fade" style="animation-delay:.7s"/>
        <path d="${revLine}" fill="none" stroke="var(--accent)" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"
              class="draw" style="--len:4000"/>
        <g class="fade" style="animation-delay:.9s">${dots}${peak}</g>
        ${labels}
      </svg>`;

    el("#revNote").textContent = `${kmoney(totalRev)} total · peak ${best.label} ${best.year}`;
  };

  /* ---------- top products: horizontal bars ---------- */
  const drawProducts = (W) => {
    const narrow = W < 520;
    const rowH = 36, T = 4;
    const L = narrow ? 0 : Math.min(178, W * 0.3);
    const R = narrow ? 62 : 152;
    const H = T + products.length * rowH * (narrow ? 1.35 : 1) + 4;
    const max = Math.max(...products.map(p => p.revenue));
    const iw = W - L - R;

    const rows = products.map((p, i) => {
      const y = T + i * rowH * (narrow ? 1.35 : 1) + (narrow ? 16 : 7);
      const bw = (p.revenue / max) * iw;
      const shade = 0.45 + (1 - i / products.length) * 0.55;
      const name = narrow
        ? `<text class="ax" x="0" y="${y - 5}" style="fill:var(--text);font-size:12.5px">${p.name}</text>`
        : `<text class="ax" x="${L - 14}" y="${y + 15}" text-anchor="end" style="fill:var(--text);font-size:12.5px">${p.name}</text>`;
      const units = narrow ? "" : `<text class="ax" x="${W - 2}" y="${y + 15}" text-anchor="end">${num(p.units)} u</text>`;
      return `
        ${name}
        <rect x="${L}" y="${y}" width="${iw}" height="21" rx="6" fill="#1a2230"/>
        <rect x="${L}" y="${y}" width="${bw.toFixed(1)}" height="21" rx="6" fill="url(#barG)" opacity="${shade.toFixed(2)}"
              class="grow" style="animation-delay:${i * 70}ms;transform-origin:${L}px 0"/>
        <text class="val" x="${(L + bw + 10).toFixed(1)}" y="${y + 15}">${kmoney(p.revenue)}</text>
        ${units}
        <title>${p.name} — ${money(p.revenue)} · ${num(p.units)} units</title>`;
    }).join("");

    el("#prodChart").innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" role="img" aria-label="Top products by revenue">
        <defs>
          <linearGradient id="barG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#37e0b0"/>
            <stop offset="100%" stop-color="#5b9dff"/>
          </linearGradient>
        </defs>
        ${rows}
      </svg>`;

    el("#prodNote").textContent = `by revenue · ${num(products.reduce((a, p) => a + p.units, 0))} units sold`;
  };

  /* ---------- render + keep charts at true pixel scale ---------- */
  let lastRev = 0, lastProd = 0;
  const render = () => {
    const rw = Math.round(el("#revChart").clientWidth);
    const pw = Math.round(el("#prodChart").clientWidth);
    if (rw && Math.abs(rw - lastRev) > 6) { lastRev = rw; drawRevenue(rw); }
    if (pw && Math.abs(pw - lastProd) > 6) { lastProd = pw; drawProducts(pw); }
  };
  render();
  new ResizeObserver(render).observe(document.body);

  /* ---------- traffic sources: donut + list ---------- */
  (() => {
    const S = 190, c = S / 2, rO = 82, rI = 54;
    const arc = (a0, a1, r) => {
      const p = (a) => [c + r * Math.cos(a), c + r * Math.sin(a)];
      const [x0, y0] = p(a0), [x1, y1] = p(a1);
      return { x0, y0, x1, y1, big: a1 - a0 > Math.PI ? 1 : 0 };
    };

    let a = -Math.PI / 2, paths = "";
    sources.forEach((s, i) => {
      const a1 = a + (s.pct / 100) * Math.PI * 2 - 0.022;
      const o = arc(a, a1, rO), n = arc(a, a1, rI);
      paths += `<path d="M${o.x0.toFixed(2)},${o.y0.toFixed(2)} A${rO},${rO} 0 ${o.big} 1 ${o.x1.toFixed(2)},${o.y1.toFixed(2)}
                 L${n.x1.toFixed(2)},${n.y1.toFixed(2)} A${rI},${rI} 0 ${o.big} 0 ${n.x0.toFixed(2)},${n.y0.toFixed(2)} Z"
                 fill="${s.color}" class="fade" style="animation-delay:${300 + i * 80}ms"><title>${s.name} — ${s.pct}%</title></path>`;
      a = a1 + 0.022;
    });

    el("#donut").innerHTML = `
      <svg viewBox="0 0 ${S} ${S}" style="width:190px;flex:0 0 auto" role="img" aria-label="Traffic sources breakdown">
        ${paths}
        <text x="${c}" y="${c - 4}" text-anchor="middle" style="fill:var(--text);font-size:21px;font-weight:700">${(totalSess / 1000).toFixed(0)}k</text>
        <text x="${c}" y="${c + 15}" text-anchor="middle" class="ax">sessions</text>
      </svg>`;

    el("#srcList").innerHTML = sources.map((s, i) => `
      <div class="src-row">
        <div class="src-name"><i style="flex:0 0 auto;width:9px;height:9px;border-radius:3px;background:${s.color}"></i><span>${s.name}</span></div>
        <div class="src-pct">${s.pct}%</div>
        <div class="bar"><i style="background:${s.color}" data-w="${s.pct / 34.2 * 100}"></i></div>
      </div>`).join("");

    requestAnimationFrame(() => setTimeout(() => {
      document.querySelectorAll(".bar i").forEach((b, i) => {
        b.style.transitionDelay = i * 60 + "ms";
        b.style.width = b.dataset.w + "%";
      });
    }, 60));
  })();
})();
</script>
</body>
</html>
