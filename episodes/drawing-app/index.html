<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sketch — Drawing App</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: rgba(28, 31, 38, 0.82);
    --panel-border: rgba(255, 255, 255, 0.08);
    --accent: #4f8cff;
    --text: #e7ebf2;
    --muted: #9aa3b2;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #canvas {
    position: fixed;
    inset: 0;
    display: block;
    background: #ffffff;
    cursor: crosshair;
    touch-action: none;
  }

  .toolbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    z-index: 10;
    max-width: calc(100vw - 24px);
    flex-wrap: wrap;
    justify-content: center;
  }

  .group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .divider {
    width: 1px;
    align-self: stretch;
    background: var(--panel-border);
    margin: 2px 2px;
  }

  .swatches {
    display: flex;
    gap: 6px;
  }

  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.25);
    cursor: pointer;
    padding: 0;
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active {
    border-color: #fff;
    box-shadow: 0 0 0 2px var(--accent);
    transform: scale(1.12);
  }

  .color-wrap {
    position: relative;
    width: 34px;
    height: 34px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--panel-border);
    cursor: pointer;
  }
  input[type="color"] {
    position: absolute;
    top: -6px;
    left: -6px;
    width: 46px;
    height: 46px;
    border: none;
    padding: 0;
    background: none;
    cursor: pointer;
  }

  .size-control {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .preview-dot-wrap {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    flex: 0 0 auto;
  }
  #previewDot {
    background: var(--accent);
    border-radius: 50%;
    transition: width 0.08s ease, height 0.08s ease;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 110px;
    height: 4px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.18);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  button.tool {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 36px;
    padding: 0 12px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
    white-space: nowrap;
  }
  button.tool:hover { background: rgba(255, 255, 255, 0.12); }
  button.tool:active { transform: translateY(1px); }
  button.tool.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.tool.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.tool.primary:hover { background: #6a9dff; }
  button.tool svg { width: 16px; height: 16px; }

  .size-label {
    font-size: 12px;
    color: var(--muted);
    min-width: 26px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="toolbar" id="toolbar">
  <div class="group" title="Pick a color">
    <div class="color-wrap">
      <input type="color" id="colorPicker" value="#1c1f26">
    </div>
    <div class="swatches" id="swatches"></div>
  </div>

  <div class="divider"></div>

  <div class="group size-control">
    <div class="preview-dot-wrap"><div id="previewDot"></div></div>
    <input type="range" id="sizeSlider" min="1" max="60" value="6">
    <span class="size-label" id="sizeLabel">6</span>
  </div>

  <div class="divider"></div>

  <div class="group">
    <button class="tool" id="eraserBtn" title="Eraser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16a2 2 0 0 1 0-3l9-9a2 2 0 0 1 3 0l5 5a2 2 0 0 1 0 3l-8 8"/><path d="m9 11 5 5"/></svg>
      Eraser
    </button>
    <button class="tool" id="undoBtn" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg>
      Undo
    </button>
    <button class="tool" id="clearBtn" title="Clear canvas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Clear
    </button>
    <button class="tool primary" id="saveBtn" title="Save as PNG">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      Save PNG
    </button>
  </div>
</div>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const QUICK_COLORS = ["#1c1f26", "#e53935", "#fb8c00", "#fdd835", "#43a047", "#1e88e5"];

  const state = {
    color: "#1c1f26",
    size: 6,
    erasing: false,
    drawing: false,
    lastX: 0,
    lastY: 0,
  };

  // Undo stack of ImageData snapshots (pushed before each stroke).
  const undoStack = [];
  const MAX_UNDO = 30;

  // --- Canvas sizing (retina-aware) with content preservation ---
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;

    // Preserve existing drawing across resize.
    let prev = null;
    if (canvas.width && canvas.height) {
      prev = document.createElement("canvas");
      prev.width = canvas.width;
      prev.height = canvas.height;
      prev.getContext("2d").drawImage(canvas, 0, 0);
    }

    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // White background so exported PNG isn't transparent.
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (prev) ctx.drawImage(prev, 0, 0);
    ctx.restore();

    ctx.lineCap = "round";
    ctx.lineJoin = "round";
  }

  // --- Undo snapshots ---
  function pushUndo() {
    try {
      undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (undoStack.length > MAX_UNDO) undoStack.shift();
    } catch (e) { /* ignore */ }
  }

  function undo() {
    if (!undoStack.length) return;
    const img = undoStack.pop();
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.putImageData(img, 0, 0);
    ctx.restore();
  }

  // --- Pointer position relative to canvas (CSS pixels) ---
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const point = (e.touches && e.touches[0]) ? e.touches[0] : e;
    return {
      x: point.clientX - rect.left,
      y: point.clientY - rect.top,
    };
  }

  function strokeStyle() {
    ctx.lineWidth = state.size;
    ctx.strokeStyle = state.erasing ? "#ffffff" : state.color;
  }

  function startDraw(e) {
    e.preventDefault();
    pushUndo();
    state.drawing = true;
    const p = getPos(e);
    state.lastX = p.x;
    state.lastY = p.y;
    // Draw a dot so a single tap leaves a mark.
    strokeStyle();
    ctx.beginPath();
    ctx.arc(p.x, p.y, state.size / 2, 0, Math.PI * 2);
    ctx.fillStyle = state.erasing ? "#ffffff" : state.color;
    ctx.fill();
  }

  function moveDraw(e) {
    if (!state.drawing) return;
    e.preventDefault();
    const p = getPos(e);
    strokeStyle();
    // Smooth interpolation via quadratic curve through the midpoint.
    const midX = (state.lastX + p.x) / 2;
    const midY = (state.lastY + p.y) / 2;
    ctx.beginPath();
    ctx.moveTo(state.lastX, state.lastY);
    ctx.quadraticCurveTo(state.lastX, state.lastY, midX, midY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    state.lastX = p.x;
    state.lastY = p.y;
  }

  function endDraw() {
    state.drawing = false;
  }

  // --- UI wiring ---
  const colorPicker = document.getElementById("colorPicker");
  const swatchesEl = document.getElementById("swatches");
  const sizeSlider = document.getElementById("sizeSlider");
  const sizeLabel = document.getElementById("sizeLabel");
  const previewDot = document.getElementById("previewDot");
  const eraserBtn = document.getElementById("eraserBtn");
  const undoBtn = document.getElementById("undoBtn");
  const clearBtn = document.getElementById("clearBtn");
  const saveBtn = document.getElementById("saveBtn");

  function setColor(c, fromSwatch) {
    state.color = c;
    state.erasing = false;
    eraserBtn.classList.remove("active");
    colorPicker.value = c;
    updatePreviewDot();
    // Highlight matching swatch.
    [...swatchesEl.children].forEach((s) => {
      s.classList.toggle("active", s.dataset.color.toLowerCase() === c.toLowerCase());
    });
  }

  function updatePreviewDot() {
    const d = Math.min(state.size, 30);
    previewDot.style.width = d + "px";
    previewDot.style.height = d + "px";
    previewDot.style.background = state.erasing ? "#cfd6e0" : state.color;
  }

  // Build quick-pick swatches.
  QUICK_COLORS.forEach((c) => {
    const b = document.createElement("button");
    b.className = "swatch";
    b.style.background = c;
    b.dataset.color = c;
    b.title = c;
    b.addEventListener("click", () => setColor(c, true));
    swatchesEl.appendChild(b);
  });

  colorPicker.addEventListener("input", (e) => setColor(e.target.value, false));

  sizeSlider.addEventListener("input", (e) => {
    state.size = parseInt(e.target.value, 10);
    sizeLabel.textContent = state.size;
    updatePreviewDot();
  });

  eraserBtn.addEventListener("click", () => {
    state.erasing = !state.erasing;
    eraserBtn.classList.toggle("active", state.erasing);
    if (state.erasing) {
      [...swatchesEl.children].forEach((s) => s.classList.remove("active"));
    } else {
      setColor(state.color, false);
    }
    updatePreviewDot();
  });

  undoBtn.addEventListener("click", undo);

  clearBtn.addEventListener("click", () => {
    pushUndo();
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  });

  saveBtn.addEventListener("click", () => {
    const link = document.createElement("a");
    link.download = "drawing-" + Date.now() + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });

  // Keyboard: Ctrl/Cmd+Z to undo.
  window.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z") {
      e.preventDefault();
      undo();
    }
  });

  // Mouse events.
  canvas.addEventListener("mousedown", startDraw);
  window.addEventListener("mousemove", moveDraw);
  window.addEventListener("mouseup", endDraw);

  // Touch events.
  canvas.addEventListener("touchstart", startDraw, { passive: false });
  canvas.addEventListener("touchmove", moveDraw, { passive: false });
  canvas.addEventListener("touchend", endDraw);
  canvas.addEventListener("touchcancel", endDraw);

  window.addEventListener("resize", resizeCanvas);

  // Init.
  resizeCanvas();
  setColor(QUICK_COLORS[0], true);
  updatePreviewDot();
})();
</script>
</body>
</html>
