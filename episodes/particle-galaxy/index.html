<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Spiral Galaxy</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#01010a;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d', { alpha: false });

  // ---- tunables ------------------------------------------------------------
  const ARMS        = 2;      // spiral arms
  const TWIST       = 3.8;    // how far the orbit ellipses rotate across the disc
  const ECC         = 0.66;   // outer-orbit eccentricity (density-wave shape)
  const TILT        = 0.62;   // vertical squash -> disc seen at an angle
  const OMEGA       = 0.055;  // pattern angular speed (rad/s)
  const SPIN        = 0.013;  // extra rigid rotation of the whole galaxy
  const HALO_FRAC   = 0.12;   // fraction of stars scattered between the arms

  // star colours by radius: hot core -> gold -> white -> blue rim
  const PALETTE = [
    [255, 246, 224], [255, 226, 176], [255, 255, 255],
    [198, 218, 255], [150, 184, 255], [255, 122, 104], [140, 240, 255]
  ];
  const NEBULA = [
    [120,  80, 220], [60, 110, 230], [190, 70, 180],
    [40, 170, 190], [230, 110,  90]
  ];

  // ---- helpers -------------------------------------------------------------
  const rnd = Math.random;
  // sum of 4 uniforms -> cheap gaussian in roughly [-1, 1]
  const gauss = () => (rnd() + rnd() + rnd() + rnd() - 2) * 0.5;
  const smoothstep = (a, b, x) => {
    const t = Math.min(1, Math.max(0, (x - a) / (b - a)));
    return t * t * (3 - 2 * t);
  };

  function makeSprite(rgb, px) {
    const c = document.createElement('canvas');
    c.width = c.height = px;
    const g = c.getContext('2d');
    const grad = g.createRadialGradient(px/2, px/2, 0, px/2, px/2, px/2);
    const [r, gg, b] = rgb;
    grad.addColorStop(0.00, `rgba(${r},${gg},${b},1)`);
    grad.addColorStop(0.16, `rgba(${r},${gg},${b},0.55)`);
    grad.addColorStop(0.40, `rgba(${r},${gg},${b},0.13)`);
    grad.addColorStop(1.00, `rgba(${r},${gg},${b},0)`);
    g.fillStyle = grad;
    g.fillRect(0, 0, px, px);
    return c;
  }

  const starSprites  = PALETTE.map(c => makeSprite(c, 64));
  const nebulaSprites = NEBULA.map(c => makeSprite(c, 128));

  // ---- state ---------------------------------------------------------------
  let W = 0, H = 0, DPR = 1, CX = 0, CY = 0, R = 1;
  let stars = [], clouds = [], backdrop = null;

  function colourFor(f) {
    const roll = rnd();
    if (f > 0.45 && roll < 0.030) return 5;          // HII regions in the arms
    if (f > 0.35 && roll < 0.045) return 6;          // rare hot blue-white
    if (f < 0.11) return 0;
    if (f < 0.30) return 1;
    if (f < 0.58) return 2;
    if (f < 0.80) return 3;
    return 4;
  }

  function buildStars(n) {
    const out = new Array(n);
    for (let i = 0; i < n; i++) {
      // semi-major axis, biased toward the centre so the bulge stays dense
      const f = Math.pow(rnd(), 0.75) * 1.12;
      const a = f * R;
      // fade the outermost orbits out so the disc has no hard rim
      const edge = 1 - smoothstep(0.66, 1.12, f) * 0.92;
      const e = ECC * Math.pow(f, 0.55);
      const halo = rnd() < HALO_FRAC;

      // orbit-ellipse orientation: the winding IS the spiral
      let tilt = f * TWIST + (Math.floor(rnd() * ARMS) * (Math.PI * 2 / ARMS));
      tilt += halo ? rnd() * Math.PI * 2 : gauss() * (0.13 + 0.20 * (1 - f));

      const ci = halo ? (rnd() < 0.5 ? 2 : 3) : colourFor(f);
      const bright = rnd() < 0.04;

      out[i] = {
        a, b: a * (1 - e),
        ct: Math.cos(tilt), st: Math.sin(tilt),
        ph: rnd() * Math.PI * 2,
        w: OMEGA * (1 + gauss() * 0.005),          // near-rigid: arms never unwind
        size: (bright ? 16 + rnd() * 12 : 5 + rnd() * 8) * (1 - 0.22 * f),
        alpha: ((halo ? 0.24 : 0.50) + rnd() * 0.45) * edge,
        tw: 0.6 + rnd() * 2.4,                      // twinkle rate
        tp: rnd() * Math.PI * 2,
        sprite: starSprites[ci]
      };
    }
    return out;
  }

  function buildClouds(n) {
    const out = new Array(n);
    for (let i = 0; i < n; i++) {
      const f = 0.18 + Math.pow(rnd(), 0.8) * 0.82;
      const a = f * R;
      const e = ECC * Math.pow(f, 0.55);
      const tilt = f * TWIST + Math.floor(rnd() * ARMS) * (Math.PI * 2 / ARMS) + gauss() * 0.2;
      out[i] = {
        a, b: a * (1 - e),
        ct: Math.cos(tilt), st: Math.sin(tilt),
        ph: rnd() * Math.PI * 2,
        w: OMEGA,
        size: R * (0.16 + rnd() * 0.34),
        alpha: 0.035 + rnd() * 0.075,
        tw: 0.15 + rnd() * 0.3,
        tp: rnd() * Math.PI * 2,
        sprite: nebulaSprites[(Math.random() * nebulaSprites.length) | 0]
      };
    }
    return out;
  }

  // deep-space background + distant field, rendered once per resize
  function buildBackdrop() {
    const c = document.createElement('canvas');
    c.width = Math.max(1, W * DPR);
    c.height = Math.max(1, H * DPR);
    const g = c.getContext('2d');
    g.scale(DPR, DPR);

    const bg = g.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.78);
    bg.addColorStop(0.00, '#12112a');
    bg.addColorStop(0.35, '#0a0a1c');
    bg.addColorStop(1.00, '#010109');
    g.fillStyle = bg;
    g.fillRect(0, 0, W, H);

    const far = Math.round(W * H / 2600);
    for (let i = 0; i < far; i++) {
      const x = rnd() * W, y = rnd() * H;
      const s = rnd() * 1.5 + 0.2;
      g.globalAlpha = 0.06 + rnd() * 0.4;
      g.fillStyle = rnd() < 0.15 ? '#bcd4ff' : '#ffffff';
      g.beginPath();
      g.arc(x, y, s, 0, Math.PI * 2);
      g.fill();
    }
    g.globalAlpha = 1;
    return c;
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = Math.min(window.devicePixelRatio || 1, 1.5);
    canvas.width = Math.max(1, Math.round(W * DPR));
    canvas.height = Math.max(1, Math.round(H * DPR));
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    CX = W * 0.5;
    CY = H * 0.5;
    R = Math.min(W, H) * 0.52;

    const count = Math.max(1200, Math.min(6500, Math.round(W * H / 215)));
    stars = buildStars(count);
    clouds = buildClouds(44);
    backdrop = buildBackdrop();
  }

  // ---- draw ----------------------------------------------------------------
  function drawBody(p, t, spinC, spinS, zoom) {
    const th = p.ph + t * p.w;
    const ex = p.a * Math.cos(th);
    const ey = p.b * Math.sin(th);
    // rotate onto the orbit's own axis, then by the galaxy's rigid spin
    const rx = ex * p.ct - ey * p.st;
    const ry = ex * p.st + ey * p.ct;
    const x = CX + (rx * spinC - ry * spinS) * zoom;
    const y = CY + (rx * spinS + ry * spinC) * TILT * zoom;

    const s = p.size * zoom;
    const h = s * 0.5;
    if (x < -s || x > W + s || y < -s || y > H + s) return;

    ctx.globalAlpha = p.alpha * (0.72 + 0.28 * Math.sin(t * p.tw + p.tp));
    ctx.drawImage(p.sprite, x - h, y - h, s, s);
  }

  function drawCore(t, zoom) {
    const pulse = 1 + 0.05 * Math.sin(t * 0.31) + 0.03 * Math.sin(t * 0.73);
    ctx.save();
    ctx.translate(CX, CY);
    ctx.scale(1, TILT);
    const layers = [
      [R * 0.10 * pulse * zoom, 'rgba(255,252,240,0.95)', 0.95],
      [R * 0.26 * pulse * zoom, 'rgba(255,224,168,0.55)', 0.55],
      [R * 0.62 * pulse * zoom, 'rgba(255,186,110,0.22)', 0.22]
    ];
    for (const [rad, col, a] of layers) {
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, rad);
      g.addColorStop(0, col);
      g.addColorStop(0.35, col.replace(/[\d.]+\)$/, (a * 0.35) + ')'));
      g.addColorStop(1, 'rgba(255,180,100,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, rad, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  let t = 0, last = 0;

  function frame(now) {
    requestAnimationFrame(frame);
    if (!last) last = now;
    // clamp dt so a backgrounded tab never jumps the animation
    t += Math.min((now - last) / 1000, 0.05);
    last = now;

    const zoom = 1 + 0.035 * Math.sin(t * 0.061);
    const spin = t * SPIN;
    const spinC = Math.cos(spin), spinS = Math.sin(spin);

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(backdrop, 0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < clouds.length; i++) drawBody(clouds[i], t, spinC, spinS, zoom);
    ctx.globalAlpha = 1;
    drawCore(t, zoom);
    for (let i = 0; i < stars.length; i++) drawBody(stars[i], t, spinC, spinS, zoom);

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  let rt = 0;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(resize, 150);
  });
  document.addEventListener('visibilitychange', () => { last = 0; });

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
