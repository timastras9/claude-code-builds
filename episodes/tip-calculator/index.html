<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tip Calculator</title>
<style>
  :root{
    --bg:#0f1115;
    --card:#181b22;
    --card2:#20242e;
    --accent:#22d3a6;
    --accent-dark:#0f9e7d;
    --text:#f4f6fb;
    --muted:#8b93a7;
    --line:#2a2f3a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px 40px;
  }
  .app{width:100%;max-width:440px;}
  header{text-align:center;margin-bottom:22px;}
  header h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;}
  header p{color:var(--muted);font-size:.9rem;margin-top:4px;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
  }
  label{
    display:block;
    font-size:.8rem;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:10px;
    font-weight:600;
  }

  .bill{
    display:flex;
    align-items:center;
    background:var(--card2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:0 16px;
    transition:border-color .15s;
  }
  .bill:focus-within{border-color:var(--accent);}
  .bill span{font-size:1.6rem;color:var(--muted);font-weight:600;}
  .bill input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--text);
    font-size:1.9rem;
    font-weight:700;
    text-align:right;
    padding:16px 0 16px 8px;
    width:100%;
    min-width:0;
  }
  .bill input::placeholder{color:#3a4150;}

  .tips{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .tip-btn{
    background:var(--card2);
    border:1px solid var(--line);
    color:var(--text);
    font-size:1.15rem;
    font-weight:700;
    padding:16px 0;
    border-radius:14px;
    cursor:pointer;
    transition:transform .08s, background .15s, border-color .15s, color .15s;
  }
  .tip-btn:active{transform:scale(.96);}
  .tip-btn.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#04150f;
  }
  .tip-btn.custom{padding:0;overflow:hidden;}
  .tip-btn.custom input{
    width:100%;
    height:100%;
    background:none;
    border:none;
    outline:none;
    text-align:center;
    color:var(--text);
    font-size:1.15rem;
    font-weight:700;
    padding:16px 0;
  }
  .tip-btn.custom input::placeholder{color:var(--muted);}
  .tip-btn.custom.active{background:var(--accent);border-color:var(--accent);}
  .tip-btn.custom.active input{color:#04150f;}
  .tip-btn.custom.active input::placeholder{color:#04150f;}

  .split{display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .stepper{
    display:flex;
    align-items:center;
    background:var(--card2);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .stepper button{
    width:52px;
    height:52px;
    background:none;
    border:none;
    color:var(--accent);
    font-size:1.6rem;
    font-weight:700;
    cursor:pointer;
    transition:background .15s;
  }
  .stepper button:active{background:rgba(34,211,166,.15);}
  .stepper .count{
    min-width:44px;
    text-align:center;
    font-size:1.3rem;
    font-weight:700;
  }

  .results{
    background:linear-gradient(160deg,#1c2e2b,#141a1f);
    border:1px solid var(--accent-dark);
  }
  .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
  }
  .row .k{color:var(--muted);font-size:.95rem;}
  .row .k small{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;}
  .row .v{font-size:1.7rem;font-weight:800;color:var(--accent);letter-spacing:-.02em;}
  .divider{height:1px;background:var(--line);margin:12px 0;opacity:.6;}
  .total .v{font-size:2rem;color:var(--text);}
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Tip Calculator</h1>
      <p>Split the bill, sort the tip</p>
    </header>

    <div class="card">
      <label for="bill">Bill amount</label>
      <div class="bill">
        <span>$</span>
        <input id="bill" type="number" inputmode="decimal" min="0" placeholder="0.00">
      </div>
    </div>

    <div class="card">
      <label>Tip percentage</label>
      <div class="tips" id="tips">
        <button class="tip-btn" data-tip="15">15%</button>
        <button class="tip-btn active" data-tip="18">18%</button>
        <button class="tip-btn" data-tip="20">20%</button>
        <div class="tip-btn custom">
          <input id="customTip" type="number" inputmode="numeric" min="0" placeholder="Custom">
        </div>
      </div>
    </div>

    <div class="card">
      <label>Split between</label>
      <div class="split">
        <span style="color:var(--muted);font-weight:600;">People</span>
        <div class="stepper">
          <button id="minus" aria-label="Fewer people">&minus;</button>
          <div class="count" id="count">1</div>
          <button id="plus" aria-label="More people">+</button>
        </div>
      </div>
    </div>

    <div class="card results">
      <div class="row">
        <div class="k">Tip amount<small>per person</small></div>
        <div class="v" id="tipOut">$0.00</div>
      </div>
      <div class="divider"></div>
      <div class="row total">
        <div class="k">Total<small>per person</small></div>
        <div class="v" id="totalOut">$0.00</div>
      </div>
    </div>
  </div>

<script>
  const billEl = document.getElementById('bill');
  const tipsEl = document.getElementById('tips');
  const customTip = document.getElementById('customTip');
  const countEl = document.getElementById('count');
  const tipOut = document.getElementById('tipOut');
  const totalOut = document.getElementById('totalOut');

  let tipPct = 18;
  let people = 1;

  function setActive(btn){
    document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
  }

  tipsEl.querySelectorAll('button[data-tip]').forEach(btn => {
    btn.addEventListener('click', () => {
      tipPct = parseFloat(btn.dataset.tip);
      customTip.value = '';
      setActive(btn);
      calc();
    });
  });

  customTip.addEventListener('input', () => {
    const v = parseFloat(customTip.value);
    if(!isNaN(v) && v >= 0){
      tipPct = v;
      setActive(customTip.parentElement);
    }
    calc();
  });

  document.getElementById('plus').addEventListener('click', () => {
    people++; countEl.textContent = people; calc();
  });
  document.getElementById('minus').addEventListener('click', () => {
    if(people > 1){ people--; countEl.textContent = people; calc(); }
  });

  billEl.addEventListener('input', calc);

  function calc(){
    const bill = parseFloat(billEl.value) || 0;
    const tipTotal = bill * (tipPct/100);
    const grand = bill + tipTotal;
    tipOut.textContent = '$' + (tipTotal/people).toFixed(2);
    totalOut.textContent = '$' + (grand/people).toFixed(2);
  }

  calc();
</script>
</body>
</html>
