<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Reverie</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 48%, rgba(12, 22, 48, 0.85), rgba(2, 4, 10, 0.96) 36%, #010206 74%, #000 100%);
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-hidden="true"></canvas>
  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d", { alpha: false });

    if (!ctx) {
      throw new Error("Canvas 2D context unavailable.");
    }

    const TAU = Math.PI * 2;
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const motionScale = reducedMotion ? 0.35 : 1;

    const planetDefs = [
      {
        name: "Mercury",
        orbit: 0.16,
        size: 0.016,
        speed: 1.7,
        phase: 0.2,
        colors: ["#f2d9bf", "#b98c65", "#6a4a39"]
      },
      {
        name: "Venus",
        orbit: 0.24,
        size: 0.023,
        speed: 1.25,
        phase: 1.5,
        colors: ["#fff0bc", "#cfa76b", "#7e5532"]
      },
      {
        name: "Earth",
        orbit: 0.34,
        size: 0.025,
        speed: 0.96,
        phase: 2.2,
        colors: ["#aef3ff", "#3078d8", "#11356f"],
        atmosphere: "rgba(120, 220, 255, 0.5)",
        moon: {
          orbit: 2.8,
          size: 0.24,
          speed: 3.3,
          color: "#ddd7cf"
        }
      },
      {
        name: "Mars",
        orbit: 0.44,
        size: 0.021,
        speed: 0.72,
        phase: 1.1,
        colors: ["#ffd0b0", "#ca6946", "#682517"]
      },
      {
        name: "Jupiter",
        orbit: 0.57,
        size: 0.044,
        speed: 0.4,
        phase: 2.8,
        colors: ["#ffedca", "#c88f5f", "#75452f"],
        bands: ["rgba(137, 72, 35, 0.18)", "rgba(255, 241, 214, 0.12)"],
        moons: 4
      },
      {
        name: "Saturn",
        orbit: 0.71,
        size: 0.037,
        speed: 0.28,
        phase: 4.5,
        colors: ["#fff1c6", "#d1b171", "#7f6341"],
        ring: {
          width: 1.9,
          thickness: 0.42,
          color: "rgba(224, 198, 140, 0.5)",
          shadow: "rgba(107, 82, 53, 0.34)",
          angle: -0.3
        }
      },
      {
        name: "Uranus",
        orbit: 0.83,
        size: 0.03,
        speed: 0.2,
        phase: 5.4,
        colors: ["#e7ffff", "#81d6db", "#388d9e"]
      },
      {
        name: "Neptune",
        orbit: 0.95,
        size: 0.029,
        speed: 0.15,
        phase: 0.9,
        colors: ["#d6f1ff", "#4f7fe9", "#1f2c7e"]
      }
    ];

    const state = {
      width: 0,
      height: 0,
      dpr: 1,
      cx: 0,
      cy: 0,
      systemRadius: 0,
      sunRadius: 0,
      orbitYScale: 0.76,
      orbitTilt: -0.18,
      stars: [],
      dust: [],
      clouds: []
    };

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function resize() {
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      state.dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(state.width * state.dpr);
      canvas.height = Math.round(state.height * state.dpr);
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

      const portrait = state.height > state.width;
      state.cx = state.width * 0.5;
      state.cy = state.height * (portrait ? 0.53 : 0.5);
      state.systemRadius = Math.min(
        Math.max(82, Math.min(state.width * 0.41, state.height * 0.34)),
        state.width * 0.43
      );
      state.sunRadius = Math.max(20, state.systemRadius * 0.075);
      state.orbitYScale = portrait ? 0.84 : 0.72;
      state.orbitTilt = portrait ? -0.12 : -0.22;

      buildField();
    }

    function buildField() {
      const area = state.width * state.height;
      const starCount = Math.round(area / 2800);
      const dustCount = Math.round(area / 18000);

      state.stars = Array.from({ length: starCount }, () => ({
        x: Math.random() * state.width,
        y: Math.random() * state.height,
        r: rand(0.35, 1.9),
        alpha: rand(0.15, 0.95),
        twinkle: rand(0.4, 2.2),
        offset: rand(0, TAU),
        hue: rand(190, 235)
      }));

      state.dust = Array.from({ length: dustCount }, () => ({
        x: Math.random() * state.width,
        y: Math.random() * state.height,
        r: rand(12, 28),
        alpha: rand(0.03, 0.09)
      }));

      state.clouds = [
        { x: state.width * 0.22, y: state.height * 0.24, r: state.systemRadius * 1.4, color: "rgba(30, 74, 152, 0.16)", drift: 18, offset: 1.2 },
        { x: state.width * 0.82, y: state.height * 0.18, r: state.systemRadius * 1.18, color: "rgba(62, 122, 129, 0.12)", drift: 14, offset: 3.5 },
        { x: state.width * 0.74, y: state.height * 0.78, r: state.systemRadius * 1.48, color: "rgba(127, 66, 18, 0.11)", drift: 20, offset: 0.6 },
        { x: state.width * 0.16, y: state.height * 0.76, r: state.systemRadius * 1.12, color: "rgba(18, 103, 112, 0.09)", drift: 16, offset: 4.1 }
      ];
    }

    function orbitPoint(radius, angle) {
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      const tiltCos = Math.cos(state.orbitTilt);
      const tiltSin = Math.sin(state.orbitTilt);
      const x = state.cx + cos * radius * tiltCos - sin * radius * state.orbitYScale * tiltSin;
      const y = state.cy + cos * radius * tiltSin + sin * radius * state.orbitYScale * tiltCos;
      return { x, y };
    }

    function drawBackground(time) {
      const base = ctx.createRadialGradient(
        state.cx,
        state.cy,
        state.sunRadius * 0.6,
        state.cx,
        state.cy,
        Math.max(state.width, state.height) * 0.9
      );
      base.addColorStop(0, "#0b1225");
      base.addColorStop(0.28, "#040713");
      base.addColorStop(0.68, "#010205");
      base.addColorStop(1, "#000000");
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, state.width, state.height);

      ctx.globalCompositeOperation = "lighter";
      for (const cloud of state.clouds) {
        const driftX = Math.cos(time * 0.000035 * motionScale + cloud.offset) * cloud.drift;
        const driftY = Math.sin(time * 0.000028 * motionScale + cloud.offset) * cloud.drift * 0.65;
        const gradient = ctx.createRadialGradient(
          cloud.x + driftX,
          cloud.y + driftY,
          0,
          cloud.x + driftX,
          cloud.y + driftY,
          cloud.r
        );
        gradient.addColorStop(0, cloud.color);
        gradient.addColorStop(0.55, cloud.color.replace(/0\.\d+\)/, "0.03)"));
        gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(cloud.x + driftX, cloud.y + driftY, cloud.r, 0, TAU);
        ctx.fill();
      }

      for (const dust of state.dust) {
        const glow = ctx.createRadialGradient(dust.x, dust.y, 0, dust.x, dust.y, dust.r);
        glow.addColorStop(0, `rgba(110, 160, 255, ${dust.alpha})`);
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(dust.x, dust.y, dust.r, 0, TAU);
        ctx.fill();
      }

      ctx.globalCompositeOperation = "source-over";

      for (const star of state.stars) {
        const pulse = 0.55 + 0.45 * Math.sin(time * 0.0011 * star.twinkle * motionScale + star.offset);
        const alpha = star.alpha * pulse;
        if (star.r < 1.1) {
          ctx.fillStyle = `hsla(${star.hue}, 80%, 88%, ${alpha})`;
          ctx.fillRect(star.x, star.y, star.r, star.r);
        } else {
          ctx.fillStyle = `hsla(${star.hue}, 80%, 92%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, TAU);
          ctx.fill();
          ctx.strokeStyle = `hsla(${star.hue}, 90%, 92%, ${alpha * 0.28})`;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(star.x - star.r * 2.6, star.y);
          ctx.lineTo(star.x + star.r * 2.6, star.y);
          ctx.moveTo(star.x, star.y - star.r * 2.6);
          ctx.lineTo(star.x, star.y + star.r * 2.6);
          ctx.stroke();
        }
      }

      drawComet(time);

      const vignette = ctx.createRadialGradient(
        state.cx,
        state.cy,
        state.systemRadius * 0.4,
        state.cx,
        state.cy,
        Math.max(state.width, state.height) * 0.7
      );
      vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
      vignette.addColorStop(0.88, "rgba(0, 0, 0, 0.1)");
      vignette.addColorStop(1, "rgba(0, 0, 0, 0.4)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function drawComet(time) {
      const cycle = 15000;
      const cycleIndex = Math.floor(time / cycle);
      const laneSeed = Math.sin(cycleIndex * 91.73 + 0.6) * 43758.5453;
      const lane = laneSeed - Math.floor(laneSeed);
      const startOffset = (cycleIndex % 3) * 1700;
      const progress = ((time + startOffset) % cycle) / cycle;
      if (progress > 0.34) {
        return;
      }

      const trail = progress / 0.34;
      const startX = -state.width * 0.15;
      const endX = state.width * 1.15;
      const yLine = state.height * (0.12 + lane * 0.36);
      const x = startX + (endX - startX) * trail;
      const y = yLine + Math.sin(trail * 8.5) * 24;
      const tail = 90 + 110 * (1 - trail);
      const angle = -0.18;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      const gradient = ctx.createLinearGradient(-tail, 0, 18, 0);
      gradient.addColorStop(0, "rgba(120, 200, 255, 0)");
      gradient.addColorStop(0.62, "rgba(120, 200, 255, 0.18)");
      gradient.addColorStop(1, "rgba(255, 255, 255, 0.94)");
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(-tail, 0);
      ctx.lineTo(12, 0);
      ctx.stroke();
      ctx.fillStyle = "rgba(255, 255, 255, 0.96)";
      ctx.beginPath();
      ctx.arc(14, 0, 2.3, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function drawOrbits() {
      ctx.lineWidth = 1.15;
      for (const def of planetDefs) {
        const radius = state.systemRadius * def.orbit;
        ctx.strokeStyle = "rgba(134, 176, 255, 0.12)";
        ctx.beginPath();
        ctx.ellipse(state.cx, state.cy, radius, radius * state.orbitYScale, state.orbitTilt, 0, TAU);
        ctx.stroke();

        ctx.strokeStyle = "rgba(198, 222, 255, 0.18)";
        ctx.beginPath();
        ctx.ellipse(state.cx, state.cy, radius, radius * state.orbitYScale, state.orbitTilt, 0, Math.PI);
        ctx.stroke();
      }
    }

    function drawSun(time) {
      const pulse = 1 + Math.sin(time * 0.0012 * motionScale) * 0.025;
      const halo = ctx.createRadialGradient(
        state.cx,
        state.cy,
        0,
        state.cx,
        state.cy,
        state.sunRadius * 4.8 * pulse
      );
      halo.addColorStop(0, "rgba(255, 249, 210, 0.9)");
      halo.addColorStop(0.12, "rgba(255, 214, 126, 0.55)");
      halo.addColorStop(0.35, "rgba(255, 141, 41, 0.22)");
      halo.addColorStop(1, "rgba(255, 120, 32, 0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, state.sunRadius * 4.8 * pulse, 0, TAU);
      ctx.fill();

      ctx.save();
      ctx.translate(state.cx, state.cy);
      ctx.rotate(time * 0.00008 * motionScale);
      for (let i = 0; i < 18; i += 1) {
        const angle = (i / 18) * TAU;
        const length = state.sunRadius * (1.58 + 0.14 * Math.sin(time * 0.0018 * motionScale + i));
        const spread = state.sunRadius * 0.2;
        ctx.strokeStyle = `rgba(255, 183, 72, ${0.08 + (i % 3) * 0.02})`;
        ctx.lineWidth = state.sunRadius * 0.08;
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * state.sunRadius * 0.86, Math.sin(angle) * state.sunRadius * 0.86);
        ctx.quadraticCurveTo(
          Math.cos(angle + 0.06) * (length - spread),
          Math.sin(angle + 0.06) * (length - spread),
          Math.cos(angle) * length,
          Math.sin(angle) * length
        );
        ctx.stroke();
      }
      ctx.restore();

      const glow = ctx.createRadialGradient(
        state.cx - state.sunRadius * 0.26,
        state.cy - state.sunRadius * 0.3,
        state.sunRadius * 0.12,
        state.cx,
        state.cy,
        state.sunRadius
      );
      glow.addColorStop(0, "#fffbe6");
      glow.addColorStop(0.28, "#ffe58f");
      glow.addColorStop(0.7, "#ff9b33");
      glow.addColorStop(1, "#d6540a");
      ctx.fillStyle = glow;
      ctx.shadowColor = "rgba(255, 180, 60, 0.65)";
      ctx.shadowBlur = state.sunRadius * 1.4;
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, state.sunRadius, 0, TAU);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.save();
      ctx.translate(state.cx, state.cy);
      ctx.rotate(-time * 0.00018 * motionScale);
      ctx.fillStyle = "rgba(173, 73, 13, 0.2)";
      for (let i = 0; i < 4; i += 1) {
        const angle = i * 1.67 + 0.4;
        ctx.beginPath();
        ctx.arc(
          Math.cos(angle) * state.sunRadius * 0.42,
          Math.sin(angle) * state.sunRadius * 0.28,
          state.sunRadius * (0.08 + i * 0.012),
          0,
          TAU
        );
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBanding(x, y, radius, colors, time, wobble) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, TAU);
      ctx.clip();
      ctx.translate(x, y);
      ctx.rotate(-0.15);
      for (let i = -3; i <= 3; i += 1) {
        const bandY = i * radius * 0.3 + Math.sin(time * 0.00035 * motionScale + wobble + i) * radius * 0.03;
        ctx.fillStyle = colors[i & 1];
        ctx.fillRect(-radius * 1.3, bandY, radius * 2.6, radius * 0.16);
      }
      ctx.restore();
    }

    function drawRing(x, y, radius, ring) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ring.angle);
      ctx.strokeStyle = ring.shadow;
      ctx.lineWidth = radius * ring.thickness;
      ctx.beginPath();
      ctx.ellipse(0, 0, radius * ring.width, radius * 0.7, 0, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }

    function drawRingFront(x, y, radius, ring) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(x - radius * 3, y, radius * 6, radius * 3);
      ctx.clip();
      ctx.translate(x, y);
      ctx.rotate(ring.angle);
      ctx.strokeStyle = ring.color;
      ctx.lineWidth = radius * (ring.thickness - 0.08);
      ctx.beginPath();
      ctx.ellipse(0, 0, radius * ring.width, radius * 0.7, 0, 0, TAU);
      ctx.stroke();
      ctx.restore();
    }

    function drawMoon(host, def, time) {
      const moonAngle = time * 0.001 * def.speed * motionScale + host.phase * 6;
      const moonOrbit = host.radius * def.orbit;
      const mx = host.x + Math.cos(moonAngle) * moonOrbit;
      const my = host.y + Math.sin(moonAngle) * moonOrbit * 0.8;
      const moonRadius = host.radius * def.size;
      const moonGradient = ctx.createRadialGradient(
        mx - moonRadius * 0.2,
        my - moonRadius * 0.2,
        moonRadius * 0.12,
        mx,
        my,
        moonRadius
      );
      moonGradient.addColorStop(0, "#f4f2eb");
      moonGradient.addColorStop(1, def.color);
      ctx.fillStyle = moonGradient;
      ctx.beginPath();
      ctx.arc(mx, my, moonRadius, 0, TAU);
      ctx.fill();
    }

    function drawJupiterMoons(host, time) {
      for (let i = 0; i < 4; i += 1) {
        const orbit = host.radius * (2.1 + i * 0.42);
        const angle = time * 0.0007 * motionScale * (1.2 + i * 0.2) + host.phase * 7 + i;
        const mx = host.x + Math.cos(angle) * orbit;
        const my = host.y + Math.sin(angle) * orbit * 0.16;
        ctx.fillStyle = `rgba(255, 239, 204, ${0.55 + i * 0.08})`;
        ctx.beginPath();
        ctx.arc(mx, my, 1.4 + i * 0.16, 0, TAU);
        ctx.fill();
      }
    }

    function drawPlanet(planet, time) {
      const lightAngle = Math.atan2(state.cy - planet.y, state.cx - planet.x);
      const gx = planet.x + Math.cos(lightAngle) * planet.radius * 0.45;
      const gy = planet.y + Math.sin(lightAngle) * planet.radius * 0.45;
      const gradient = ctx.createRadialGradient(
        gx,
        gy,
        planet.radius * 0.16,
        planet.x,
        planet.y,
        planet.radius
      );
      gradient.addColorStop(0, planet.colors[0]);
      gradient.addColorStop(0.56, planet.colors[1]);
      gradient.addColorStop(1, planet.colors[2]);

      if (planet.ring) {
        drawRing(planet.x, planet.y, planet.radius, planet.ring);
      }

      ctx.shadowColor = "rgba(255, 255, 255, 0.08)";
      ctx.shadowBlur = planet.radius * 0.8;
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(planet.x, planet.y, planet.radius, 0, TAU);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (planet.name === "Earth") {
        ctx.fillStyle = "rgba(132, 216, 116, 0.55)";
        ctx.beginPath();
        ctx.arc(planet.x - planet.radius * 0.22, planet.y + planet.radius * 0.05, planet.radius * 0.22, 0, TAU);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(planet.x + planet.radius * 0.18, planet.y - planet.radius * 0.16, planet.radius * 0.17, planet.radius * 0.12, 0.5, 0, TAU);
        ctx.fill();
      }

      if (planet.bands) {
        drawBanding(planet.x, planet.y, planet.radius, planet.bands, time, planet.phase);
      }

      if (planet.atmosphere) {
        ctx.strokeStyle = planet.atmosphere;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(planet.x, planet.y, planet.radius + 0.9, 0, TAU);
        ctx.stroke();
      }

      if (planet.ring) {
        drawRingFront(planet.x, planet.y, planet.radius, planet.ring);
      }

      if (planet.moon) {
        drawMoon(planet, planet.moon, time);
      }

      if (planet.moons) {
        drawJupiterMoons(planet, time);
      }
    }

    function render(time) {
      drawBackground(time);
      drawOrbits();
      drawSun(time);

      const planets = planetDefs.map((def) => {
        const orbitRadius = state.systemRadius * def.orbit;
        const angle = time * 0.00018 * def.speed * motionScale + def.phase;
        const point = orbitPoint(orbitRadius, angle);
        return {
          ...def,
          x: point.x,
          y: point.y,
          radius: Math.max(3.2, state.systemRadius * def.size)
        };
      });

      planets.sort((a, b) => a.y - b.y);
      for (const planet of planets) {
        drawPlanet(planet, time);
      }
    }

    function frame(time) {
      render(time);
      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", resize, { passive: true });
    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
