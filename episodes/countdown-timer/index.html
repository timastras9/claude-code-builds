<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --glow: #46e6ff;
    --glow2: #7c5cff;
  }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 30%, #131a2e 0%, #080b16 60%, #04060d 100%);
    color: #eaf2ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 2.4rem;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }
  h1 {
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #9fb2d8;
    text-align: center;
  }
  #label {
    color: var(--glow);
    text-shadow: 0 0 14px rgba(70,230,255,.55);
  }
  .controls {
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  input[type="datetime-local"] {
    background: rgba(20,28,48,.8);
    border: 1px solid rgba(124,92,255,.45);
    color: #eaf2ff;
    padding: .7rem 1rem;
    border-radius: .7rem;
    font-size: 1rem;
    outline: none;
    color-scheme: dark;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="datetime-local"]:focus {
    border-color: var(--glow);
    box-shadow: 0 0 0 3px rgba(70,230,255,.18);
  }
  button {
    background: linear-gradient(135deg, var(--glow2), var(--glow));
    color: #06101f;
    border: none;
    padding: .72rem 1.4rem;
    border-radius: .7rem;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 0 18px rgba(70,230,255,.35);
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 0 26px rgba(70,230,255,.6); }
  button:active { transform: translateY(0); }
  .timer {
    display: flex;
    gap: clamp(.7rem, 3vw, 2.2rem);
    flex-wrap: wrap;
    justify-content: center;
  }
  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: clamp(70px, 18vw, 150px);
  }
  .digits {
    font-size: clamp(2.8rem, 12vw, 7rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: #ffffff;
    text-shadow:
      0 0 8px rgba(70,230,255,.9),
      0 0 22px rgba(70,230,255,.65),
      0 0 46px rgba(124,92,255,.55);
  }
  .name {
    margin-top: .9rem;
    font-size: clamp(.65rem, 2vw, .9rem);
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #7f92bb;
  }
  #message {
    font-size: clamp(1.3rem, 5vw, 2.4rem);
    font-weight: 700;
    color: var(--glow);
    text-shadow: 0 0 20px rgba(70,230,255,.7);
    text-align: center;
    min-height: 1.2em;
  }
</style>
</head>
<body>
  <h1>Counting down to <span id="label">a target date</span></h1>

  <div class="controls">
    <input type="datetime-local" id="target" />
    <button id="setBtn">Start Countdown</button>
  </div>

  <div class="timer" id="timer">
    <div class="unit"><span class="digits" id="days">00</span><span class="name">Days</span></div>
    <div class="unit"><span class="digits" id="hours">00</span><span class="name">Hours</span></div>
    <div class="unit"><span class="digits" id="minutes">00</span><span class="name">Minutes</span></div>
    <div class="unit"><span class="digits" id="seconds">00</span><span class="name">Seconds</span></div>
  </div>

  <div id="message"></div>

  <script>
    const el = id => document.getElementById(id);
    const targetInput = el("target");
    const label = el("label");
    const timer = el("timer");
    const message = el("message");
    let targetTime = null;
    let tick = null;

    const pad = n => String(n).padStart(2, "0");

    function defaultTarget() {
      const d = new Date();
      d.setDate(d.getDate() + 30);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function toInputValue(d) {
      const off = d.getTimezoneOffset();
      return new Date(d.getTime() - off * 60000).toISOString().slice(0, 16);
    }

    function formatLabel(d) {
      return d.toLocaleString(undefined, {
        weekday: "short", month: "short", day: "numeric",
        year: "numeric", hour: "2-digit", minute: "2-digit"
      });
    }

    function update() {
      const now = new Date();
      let diff = Math.floor((targetTime - now) / 1000);
      if (diff <= 0) {
        el("days").textContent = el("hours").textContent =
          el("minutes").textContent = el("seconds").textContent = "00";
        message.textContent = "🎉 Time's up!";
        clearInterval(tick);
        return;
      }
      message.textContent = "";
      const days = Math.floor(diff / 86400); diff -= days * 86400;
      const hours = Math.floor(diff / 3600); diff -= hours * 3600;
      const minutes = Math.floor(diff / 60);
      const seconds = diff - minutes * 60;
      el("days").textContent = pad(days);
      el("hours").textContent = pad(hours);
      el("minutes").textContent = pad(minutes);
      el("seconds").textContent = pad(seconds);
    }

    function start(d) {
      targetTime = d;
      label.textContent = formatLabel(d);
      clearInterval(tick);
      update();
      tick = setInterval(update, 1000);
    }

    el("setBtn").addEventListener("click", () => {
      const val = targetInput.value;
      if (!val) return;
      const d = new Date(val);
      if (isNaN(d)) return;
      start(d);
    });

    const initial = defaultTarget();
    targetInput.value = toInputValue(initial);
    start(initial);
  </script>
</body>
</html>
