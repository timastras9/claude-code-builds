<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palette</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    background: #111;
  }
  .palette {
    display: flex;
    height: 100vh;
    width: 100vw;
  }
  .swatch {
    flex: 1;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    cursor: pointer;
    transition: flex 0.4s cubic-bezier(.2,.8,.2,1);
  }
  .swatch:hover { flex: 1.35; }
  .label {
    margin-bottom: 12vh;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: clamp(14px, 1.6vw, 22px);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    backdrop-filter: blur(6px);
    background: rgba(255,255,255,0.12);
    user-select: none;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .swatch:hover .label { transform: translateY(-6px); }
  .copied .label {
    background: rgba(255,255,255,0.9) !important;
    color: #111 !important;
  }
  .hint {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.9);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    padding: 10px 20px;
    border-radius: 999px;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .gen-btn {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    color: #111;
    border: none;
    padding: 14px 30px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 999px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .gen-btn:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.45); }
  .gen-btn:active { transform: translateX(-50%) scale(0.97); }
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 12px 22px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="hint">Press <b>space</b> for a new palette · click a swatch to copy</div>
  <div class="palette" id="palette"></div>
  <button class="gen-btn" id="gen">Generate</button>
  <div class="toast" id="toast"></div>

<script>
  const palette = document.getElementById('palette');
  const toast = document.getElementById('toast');
  const hint = document.querySelector('.hint');
  let toastTimer;

  // HSL -> HEX
  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    const toHex = x => Math.round(255 * x).toString(16).padStart(2, '0');
    return '#' + toHex(f(0)) + toHex(f(8)) + toHex(f(4));
  }

  // Generate 5 harmonious colors from a random base hue using varied schemes.
  function generatePalette() {
    const base = Math.random() * 360;
    const schemes = [
      [0, 30, 60, 180, 210],      // analogous + complements
      [0, 72, 144, 216, 288],     // evenly spread (harmonious wheel)
      [0, 20, 40, 200, 220],      // split complementary
      [0, 15, 30, 45, 180],       // tight analogous + accent
    ];
    const offsets = schemes[Math.floor(Math.random() * schemes.length)];
    return offsets.map((off, i) => {
      const h = (base + off) % 360;
      const s = 55 + Math.random() * 35;                 // 55-90%
      const l = 45 + (i - 2) * 6 + Math.random() * 8;    // gentle light spread
      return hslToHex(h, s, Math.max(30, Math.min(75, l)));
    });
  }

  function contrastColor(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return lum > 0.6 ? '#111' : '#fff';
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
  }

  function copyHex(hex, el) {
    const done = () => {
      el.classList.add('copied');
      showToast('Copied ' + hex);
      setTimeout(() => el.classList.remove('copied'), 500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(hex).then(done).catch(() => fallbackCopy(hex, done));
    } else {
      fallbackCopy(hex, done);
    }
  }

  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    cb();
  }

  function render(colors) {
    palette.innerHTML = '';
    colors.forEach(hex => {
      const fg = contrastColor(hex);
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = hex;
      const label = document.createElement('div');
      label.className = 'label';
      label.style.color = fg;
      label.textContent = hex;
      swatch.appendChild(label);
      swatch.addEventListener('click', () => copyHex(hex, swatch));
      palette.appendChild(swatch);
    });
  }

  function newPalette() {
    render(generatePalette());
  }

  document.getElementById('gen').addEventListener('click', newPalette);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (hint) hint.style.opacity = '0';
      newPalette();
    }
  });

  newPalette();
</script>
</body>
</html>
