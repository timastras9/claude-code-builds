<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --field: #0f172a;
    --border: #334155;
    --accent: #38bdf8;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--text);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  select, input {
    width: 100%;
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
  }
  .category { margin-bottom: 24px; }
  .row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .unit-block { flex: 1; min-width: 0; }
  .unit-block input { margin-bottom: 8px; }
  .swap-wrap {
    display: flex;
    justify-content: center;
    margin: 14px 0;
  }
  .swap {
    background: var(--accent);
    border: none;
    color: #0f172a;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s, filter 0.15s;
  }
  .swap:hover { filter: brightness(1.1); }
  .swap:active { transform: rotate(180deg); }
</style>
</head>
<body>
  <div class="card">
    <h1>Unit Converter</h1>
    <p class="subtitle">Convert instantly as you type</p>

    <div class="category">
      <label for="category">Category</label>
      <select id="category">
        <option value="length">Length</option>
        <option value="weight">Weight</option>
        <option value="temperature">Temperature</option>
      </select>
    </div>

    <div class="unit-block">
      <label for="fromUnit">From</label>
      <input type="number" id="fromValue" placeholder="0" />
      <select id="fromUnit"></select>
    </div>

    <div class="swap-wrap">
      <button class="swap" id="swap" title="Swap units">&#8645;</button>
    </div>

    <div class="unit-block">
      <label for="toUnit">To</label>
      <input type="number" id="toValue" placeholder="0" />
      <select id="toUnit"></select>
    </div>
  </div>

<script>
  // Length & weight use factors relative to a base unit.
  const units = {
    length: {
      base: 'Meter',
      list: {
        Millimeter: 0.001, Centimeter: 0.01, Meter: 1, Kilometer: 1000,
        Inch: 0.0254, Foot: 0.3048, Yard: 0.9144, Mile: 1609.344
      }
    },
    weight: {
      base: 'Gram',
      list: {
        Milligram: 0.001, Gram: 1, Kilogram: 1000, Tonne: 1e6,
        Ounce: 28.349523125, Pound: 453.59237, Stone: 6350.29318
      }
    },
    temperature: {
      list: { Celsius: 'C', Fahrenheit: 'F', Kelvin: 'K' }
    }
  };

  const categoryEl = document.getElementById('category');
  const fromUnit = document.getElementById('fromUnit');
  const toUnit = document.getElementById('toUnit');
  const fromValue = document.getElementById('fromValue');
  const toValue = document.getElementById('toValue');

  function fillUnits() {
    const cat = categoryEl.value;
    const keys = Object.keys(units[cat].list);
    [fromUnit, toUnit].forEach(sel => {
      sel.innerHTML = '';
      keys.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k; opt.textContent = k;
        sel.appendChild(opt);
      });
    });
    fromUnit.selectedIndex = 0;
    toUnit.selectedIndex = Math.min(1, keys.length - 1);
  }

  function toBase(cat, unit, v) {
    if (cat === 'temperature') {
      if (unit === 'Celsius') return v;
      if (unit === 'Fahrenheit') return (v - 32) * 5/9;
      if (unit === 'Kelvin') return v - 273.15;
    }
    return v * units[cat].list[unit];
  }

  function fromBase(cat, unit, base) {
    if (cat === 'temperature') {
      if (unit === 'Celsius') return base;
      if (unit === 'Fahrenheit') return base * 9/5 + 32;
      if (unit === 'Kelvin') return base + 273.15;
    }
    return base / units[cat].list[unit];
  }

  function round(n) {
    if (!isFinite(n)) return '';
    return parseFloat(n.toFixed(6)).toString();
  }

  function convert(source) {
    const cat = categoryEl.value;
    const src = source === 'to' ? toValue : fromValue;
    const dst = source === 'to' ? fromValue : toValue;
    const srcUnit = source === 'to' ? toUnit.value : fromUnit.value;
    const dstUnit = source === 'to' ? fromUnit.value : toUnit.value;

    if (src.value.trim() === '') { dst.value = ''; return; }
    const v = parseFloat(src.value);
    if (isNaN(v)) { dst.value = ''; return; }

    const base = toBase(cat, srcUnit, v);
    dst.value = round(fromBase(cat, dstUnit, base));
  }

  categoryEl.addEventListener('change', () => { fillUnits(); convert('from'); });
  fromValue.addEventListener('input', () => convert('from'));
  toValue.addEventListener('input', () => convert('to'));
  fromUnit.addEventListener('change', () => convert('from'));
  toUnit.addEventListener('change', () => convert('from'));

  document.getElementById('swap').addEventListener('click', () => {
    const u = fromUnit.value;
    fromUnit.value = toUnit.value;
    toUnit.value = u;
    const val = fromValue.value;
    fromValue.value = toValue.value;
    toValue.value = val;
    convert('from');
  });

  fillUnits();
</script>
</body>
</html>
