<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analog Clock</title>
<style>
  :root{
    --bg-1:#0b1020;
    --bg-2:#131a33;
    --dial-1:#1c2440;
    --dial-2:#0e1428;
    --face-1:#202a4a;
    --face-2:#121a30;
    --tick:#8ea2d0;
    --tick-strong:#e8eeff;
    --hand:#f2f6ff;
    --second:#ff5d73;
    --glow:#5b8cff;
    --text:#c3cee8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;
    background:
      radial-gradient(1200px 800px at 50% -10%, #1b2748 0%, transparent 60%),
      radial-gradient(900px 700px at 85% 110%, #241a3c 0%, transparent 60%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    color:var(--text);
    overflow:hidden;
  }
  .stage{
    position:relative;width:min(78vmin,460px);aspect-ratio:1;
    filter:drop-shadow(0 40px 70px rgba(0,0,0,.55));
    animation:rise .9s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
  .stage::after{
    content:"";position:absolute;inset:-14%;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(91,140,255,.16) 0%, transparent 62%);
  }
  svg{width:100%;height:100%;display:block;position:relative;z-index:1}
  .hand{transform-box:fill-box;transform-origin:50% 50%}
  .readout{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    animation:rise 1.1s cubic-bezier(.2,.8,.2,1) both;
  }
  #digital{
    font-size:clamp(26px,5.2vmin,40px);letter-spacing:.16em;font-weight:600;
    color:#eef3ff;text-shadow:0 0 26px rgba(91,140,255,.55);
    font-variant-numeric:tabular-nums;
  }
  #digital .sec{color:var(--second);text-shadow:0 0 22px rgba(255,93,115,.5)}
  #digital .ampm{font-size:.5em;letter-spacing:.24em;color:var(--tick);margin-left:.5em}
  #date{font-size:clamp(11px,2.1vmin,14px);letter-spacing:.34em;text-transform:uppercase;opacity:.62}
</style>
</head>
<body>

<div class="stage">
  <svg viewBox="0 0 400 400" aria-label="Analog clock">
    <defs>
      <radialGradient id="bezel" cx="35%" cy="20%" r="85%">
        <stop offset="0%"  stop-color="#5c6c99"/>
        <stop offset="45%" stop-color="#2b3557"/>
        <stop offset="100%" stop-color="#151c33"/>
      </radialGradient>
      <radialGradient id="face" cx="38%" cy="26%" r="90%">
        <stop offset="0%"  stop-color="#26325a"/>
        <stop offset="60%" stop-color="#161f3a"/>
        <stop offset="100%" stop-color="#0c1226"/>
      </radialGradient>
      <linearGradient id="sheen" x1="0" y1="0" x2="0.4" y2="1">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity=".16"/>
        <stop offset="55%"  stop-color="#ffffff" stop-opacity=".02"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="handShadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity=".45"/>
      </filter>
    </defs>

    <circle cx="200" cy="200" r="196" fill="url(#bezel)"/>
    <circle cx="200" cy="200" r="181" fill="url(#face)" stroke="#0a0f1f" stroke-width="2"/>
    <circle cx="200" cy="200" r="171" fill="none" stroke="#ffffff" stroke-opacity=".05"/>

    <g id="ticks"></g>
    <g id="numerals"></g>

    <text x="200" y="132" text-anchor="middle"
          font-family="SF Mono, ui-monospace, monospace" font-size="10"
          letter-spacing="4" fill="#8ea2d0" fill-opacity=".55">CLAUDE</text>

    <!-- hands -->
    <g filter="url(#handShadow)">
      <g id="hourHand" class="hand">
        <rect x="196" y="106" width="8" height="112" rx="4" fill="var(--hand)"/>
        <rect x="197.5" y="112" width="5" height="90" rx="2.5" fill="#9fb4e6" fill-opacity=".55"/>
      </g>
      <g id="minuteHand" class="hand">
        <rect x="197" y="62" width="6" height="158" rx="3" fill="var(--hand)"/>
        <rect x="198.2" y="68" width="3.6" height="130" rx="1.8" fill="#9fb4e6" fill-opacity=".4"/>
      </g>
    </g>
    <g id="secondHand" class="hand" filter="url(#soft)">
      <rect x="198.6" y="48" width="2.8" height="182" rx="1.4" fill="var(--second)"/>
      <circle cx="200" cy="78" r="5.5" fill="none" stroke="var(--second)" stroke-width="2.4"/>
    </g>

    <circle cx="200" cy="200" r="9" fill="#0d1226"/>
    <circle cx="200" cy="200" r="8.5" fill="#141c33" stroke="#8ea2d0" stroke-opacity=".5"/>
    <circle cx="200" cy="200" r="3.2" fill="var(--second)"/>

    <ellipse cx="150" cy="120" rx="120" ry="96" fill="url(#sheen)" transform="rotate(-24 150 120)"/>
  </svg>
</div>

<div class="readout">
  <div id="digital">--:--<span class="sec">:--</span></div>
  <div id="date">&nbsp;</div>
</div>

<script>
(function () {
  const svgNS = "http://www.w3.org/2000/svg";
  const ticks = document.getElementById("ticks");
  const numerals = document.getElementById("numerals");
  const CX = 200, CY = 200;

  // --- build the dial ------------------------------------------------------
  for (let i = 0; i < 60; i++) {
    const major = i % 5 === 0;
    const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const rOuter = 168;
    const rInner = major ? 152 : 161;
    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", CX + Math.cos(a) * rInner);
    line.setAttribute("y1", CY + Math.sin(a) * rInner);
    line.setAttribute("x2", CX + Math.cos(a) * rOuter);
    line.setAttribute("y2", CY + Math.sin(a) * rOuter);
    line.setAttribute("stroke", major ? "var(--tick-strong)" : "var(--tick)");
    line.setAttribute("stroke-opacity", major ? "0.95" : "0.35");
    line.setAttribute("stroke-width", major ? 3.2 : 1.2);
    line.setAttribute("stroke-linecap", "round");
    ticks.appendChild(line);
  }

  for (let h = 1; h <= 12; h++) {
    const a = (h / 12) * Math.PI * 2 - Math.PI / 2;
    const t = document.createElementNS(svgNS, "text");
    t.setAttribute("x", CX + Math.cos(a) * 128);
    t.setAttribute("y", CY + Math.sin(a) * 128);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("dominant-baseline", "central");
    t.setAttribute("font-family", "SF Mono, ui-monospace, Menlo, monospace");
    t.setAttribute("font-size", "26");
    t.setAttribute("font-weight", "600");
    t.setAttribute("fill", "#e8eeff");
    t.setAttribute("fill-opacity", h % 3 === 0 ? "0.95" : "0.62");
    t.textContent = h;
    numerals.appendChild(t);
  }

  // --- animate -------------------------------------------------------------
  const hourHand = document.getElementById("hourHand");
  const minuteHand = document.getElementById("minuteHand");
  const secondHand = document.getElementById("secondHand");
  const digital = document.getElementById("digital");
  const dateEl = document.getElementById("date");

  const pad = n => String(n).padStart(2, "0");
  let lastSecond = -1;

  function frame() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds();
    const m = now.getMinutes();
    const h = now.getHours();

    // Mechanical tick: snap to the second, with a tiny settle overshoot.
    const settle = Math.min(ms / 90, 1);            // 0 -> 1 over the first 90ms
    const overshoot = Math.sin(settle * Math.PI) * (1 - settle) * 1.6; // degrees
    secondHand.style.transform = `rotate(${s * 6 + overshoot}deg)`;

    // Minute steps with the second hand; hour glides continuously.
    minuteHand.style.transform = `rotate(${m * 6 + s * 0.1}deg)`;
    hourHand.style.transform = `rotate(${(h % 12) * 30 + m * 0.5 + s * (0.5 / 60)}deg)`;

    if (s !== lastSecond) {
      lastSecond = s;
      const h12 = h % 12 || 12;
      digital.innerHTML =
        `${pad(h12)}:${pad(m)}<span class="sec">:${pad(s)}</span>` +
        `<span class="ampm">${h < 12 ? "AM" : "PM"}</span>`;
      dateEl.textContent = now.toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric", year: "numeric"
      });
    }

    requestAnimationFrame(frame);
  }

  frame();
})();
</script>
</body>
</html>
